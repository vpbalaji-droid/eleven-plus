<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1b1f3b" />
  <title>11+ Mock Tests</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">11<span class="plus">+</span></span>
      <span class="brand-name">Mock Tests</span>
    </div>
    <span class="tagline">Practise. Time. Improve.</span>
  </header>

  <main id="app"><!-- views injected by app.js --></main>

  <!-- order matters: data → engine → app -->
  <script src="data/questions.js"></script>
  <script src="data/engine.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
